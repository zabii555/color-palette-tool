<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23D4AF37' width='100' height='100'/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lexure - Color Palette Tool</title>
    <meta name="description" content="Extract stunning color palettes from your images. Professional color extraction and management tool." />
    <meta name="theme-color" content="#000000" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
    
    <!-- Script to fix Vercel blank page issue -->
    <script type="text/javascript">
      (function() {
        if (window.location.search === "?y") return;
        if (window.location.search && window.location.search !== "") {
          var decoded = window.location.search
            .slice(1)
            .split("&")
            .map(function(s) {
              return s.replace(/&and=/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            window.location.pathname + (decoded ? "?" + decoded : "") + window.location.hash
          );
        }
      })(window);
    </script>
  </body>
</html>
